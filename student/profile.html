<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - LIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/student-profile.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="offcanvas-lg offcanvas-start sidebar" id="sidebarMenu">
        <div class="sidebar-logo">
            <h4><i class="fas fa-book-reader me-2"></i>LIMS</h4>
        </div>
        <div class="d-flex flex-column p-3">
            <div class="d-flex align-items-center mb-4 p-2 bg-light rounded">
                <img src="https://ui-avatars.com/api/?name=Ali+Abu&background=random" class="rounded-circle me-2" width="40" alt="Avatar">
                <div>
                    <h6 class="mb-0 fw-bold">Ali Abu</h6>
                    <small class="text-muted">Student</small>
                </div>
            </div>

            <nav class="nav flex-column gap-2">
                <a class="nav-link" href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
                <a class="nav-link" href="log-entries.html"><i class="fas fa-pen-fancy"></i> Log Entries</a>
                <a class="nav-link" href="reminders.html"><i class="fas fa-bell"></i> Set Notifications</a>
                <a class="nav-link" href="progress.html"><i class="fas fa-chart-bar"></i> View Progress</a>
                <a class="nav-link active" href="profile.html"><i class="fas fa-user-cog"></i> Profile</a>
                <a class="nav-link text-danger mt-4" href="../index.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Profile</h2>
            <button class="btn btn-primary-custom d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">Menu</button>
        </div>

        <div class="row">
            <!-- Profile Card -->
            <div class="col-lg-4 mb-4">
                <div class="card card-custom p-4 text-center">
                    <div class="position-relative d-inline-block mx-auto mb-3">
                        <img src="https://ui-avatars.com/api/?name=Ali+Abu&background=random&size=128" class="rounded-circle shadow-sm" alt="Profile">
                        <button class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 end-0 border-white border-2">
                            <i class="fas fa-camera"></i>
                        </button>
                    </div>
                    <h5 class="fw-bold mb-1">Ali Abu</h5>
                    <p class="text-muted">Software Engineering Student</p>
                    <div class="d-flex justify-content-center gap-2 mt-2">
                        <span class="badge bg-primary">Active</span>
                        <span class="badge bg-light text-dark border">Semester 6</span>
                    </div>
                </div>
            </div>

            <!-- Details Form -->
            <div class="col-lg-8">
                <div class="card card-custom p-4">
                    <h5 class="fw-bold mb-4">Personal Information</h5>
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" value="Ali Abu" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Metric ID</label>
                                <input type="text" class="form-control" value="A19EC0001" readonly>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" value="ali.abu@graduate.utm.my">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" value="+60 12-345 6789">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" rows="2">Kolej Tun Dr Ismail, UTM Skudai, Johor.</textarea>
                        </div>
                        
                        <h5 class="fw-bold mb-4 border-top pt-4">Industrial Training Details</h5>
                         <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Company Name</label>
                                <input type="text" class="form-control" value="Tech Solutions Sdn Bhd">
                            </div>
                             <div class="col-md-6">
                                <label class="form-label">Department</label>
                                <input type="text" class="form-control" value="Software Development">
                            </div>
                        </div>
                         <div class="row mb-3">
                             <div class="col-md-6">
                                <label class="form-label">Academic Supervisor</label>
                                <input type="text" class="form-control" value="Dr. Hidayah" readonly>
                            </div>
                             <div class="col-md-6">
                                <label class="form-label">Industry Supervisor</label>
                                <input type="text" class="form-control" value="Mr. Tan">
                            </div>
                        </div>


                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-outline-secondary">Cancel</button>
                            <button type="submit" class="btn btn-primary-custom">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
