<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Entries - LIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/student-log-entries.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="offcanvas-lg offcanvas-start sidebar" id="sidebarMenu">
        <div class="sidebar-logo">
            <h4><i class="fas fa-book-reader me-2"></i>LIMS</h4>
        </div>
        <div class="d-flex flex-column p-3">
            <div class="d-flex align-items-center mb-4 p-2 bg-light rounded">
                <img src="https://ui-avatars.com/api/?name=Ali+Abu&background=random" class="rounded-circle me-2" width="40" alt="Avatar">
                <div>
                    <h6 class="mb-0 fw-bold">Ali Abu</h6>
                    <small class="text-muted">Student</small>
                </div>
            </div>

            <nav class="nav flex-column gap-2">
                <a class="nav-link" href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
                <a class="nav-link active" href="log-entries.html"><i class="fas fa-pen-fancy"></i> Log Entries</a>
                <a class="nav-link" href="reminders.html"><i class="fas fa-bell"></i> Set Notifications</a>
                <a class="nav-link" href="progress.html"><i class="fas fa-chart-bar"></i> View Progress</a>
                <a class="nav-link" href="profile.html"><i class="fas fa-user-cog"></i> Profile</a>
                <a class="nav-link text-danger mt-4" href="../index.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Daily Log Entry</h2>
            <div>
                 <button class="btn btn-primary-custom d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                    Menu
                </button>
            </div>
        </div>

        <div class="row justify-content-between">
            <div class="col-12">
                <div class="card card-custom p-4">
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Week</label>
                                <select class="form-select">
                                    <option>Week 1</option>
                                    <option>Week 2</option>
                                    <option>Week 3</option>
                                    <option>Week 4</option>
                                    <option selected>Week 5</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Task Description</label>
                            <div class="position-relative">
                                <textarea class="form-control" rows="6" placeholder="Describe your daily activities..."></textarea>
                                <button type="button" class="btn btn-sm btn-outline-primary position-absolute bottom-0 end-0 m-2" title="AI Suggest Summary">
                                    <i class="fas fa-magic me-1"></i> AI Helper
                                </button>
                            </div>
                            <div class="form-text">Click the AI Helper button to generate a professional summary of your tasks based on your description and images.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Attachments (Images)</label>
                            <div class="border border-dashed p-4 text-center rounded bg-light">
                                <i class="fas fa-cloud-upload-alt fa-2x text-muted mb-2"></i>
                                <p class="text-muted mb-2">Drag & drop files or <a href="#" class="text-primary">Browse</a></p>
                                <small class="text-muted">Supported formats: JPG, PNG</small>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3">
                            <button type="button" class="btn btn-outline-secondary px-4">Save Draft</button>
                            <button type="submit" class="btn btn-primary-custom px-4">Submit Log</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
