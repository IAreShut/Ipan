<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - LIMS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login-register.css">
</head>
<body class="bg-light">

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary-custom"><i class="fas fa-book-reader me-2"></i>LIMS</h3>
                <p class="text-muted">Welcome back! Please login to continue.</p>
            </div>

            <!-- Tabs for Login / Register -->
            <ul class="nav nav-pills mb-4 justify-content-center" id="pills-tab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active rounded-pill px-4" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab" aria-selected="true">Login</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill px-4" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab" aria-selected="false">Register</button>
                </li>
            </ul>

            <div class="tab-content" id="pills-tabContent">
                
                <!-- LOGIN FORM -->
                <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" placeholder="********" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-select" id="loginRole">
                                <option value="student">Student</option>
                                <option value="supervisor">Supervisor</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary-custom btn-lg">Login</button>
                        </div>
                    </form>
                </div>

                <!-- REGISTER FORM -->
                <div class="tab-pane fade" id="pills-register" role="tabpanel">
                    <form onsubmit="handleRegister(event)"> <!-- Simplified for demo -->
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@varsity.edu.my" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Internship Company / Place</label>
                            <input type="text" class="form-control" placeholder="ABC Tech Solutions" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                             <select class="form-select" id="regRole">
                                <option value="student">Student</option>
                                <option value="supervisor">Supervisor</option>
                            </select>
                        </div>
                         <div class="mb-3" id="supervisorField">
                            <label class="form-label">Select Supervisor</label>
                            <select class="form-select">
                                <option selected disabled>Choose...</option>
                                <option>Dr. Hidayah</option>
                                <option>Prof. Johan</option>
                                <option>Dr. Smith</option>
                            </select>
                            <div class="form-text">Required for students only.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">Register Account</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
